<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>StrateGeo WebGIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */
    #sidebar {
      position: absolute;
      width: 280px;
      height: 100vh;
      overflow-y: auto;
      background: linear-gradient(180deg, #181D27, #11151C);
      color: white;
      padding: 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
      z-index: 10;
    }

    /* MAP */
    #map {
      position: absolute;
      left: 280px;
      right: 0;
      top: 0;
      bottom: 0;
    }

    h2 {
      color: #69B578;
      margin-bottom: 25px;
    }

    h3 {
      margin-top: 25px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.05);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    /* LAYER ITEM */
    .layer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px;
    }

    .layer-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #69B578;
    }

    /* INPUT */
    select, input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #222;
      color: white;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 6px;
      transition: 0.2s;
    }

    .btn-primary {
      background: #3A7D44;
      color: white;
    }

    .btn-secondary {
      background: #333;
      color: white;
    }

    button:hover {
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<div id="sidebar">

  <h2>StrateGeo</h2>

  <!-- BASEMAP -->
  <h3>Basemap</h3>
  <div class="card">
    <select id="basemap">
      <option value="street">Street</option>
      <option value="dark">Dark</option>
      <option value="satellite">Satellite</option>
    </select>
  </div>

  <!-- LAYERS -->
  <h3>Layers</h3>
  <div class="card">

    <div class="layer-item">
      <label>
        <input type="checkbox" id="admin" checked>
        Batas Administrasi
      </label>
    </div>

    <div class="layer-item">
      <label>
        <input type="checkbox" id="road" checked>
        Jalan
      </label>
    </div>

    <div class="layer-item">
      <label>
        <input type="checkbox" id="demand" checked>
        Supermarket
      </label>
    </div>

    <div class="layer-item">
      <label>
        <input type="checkbox" id="warehouse" checked>
        Warehouse
      </label>
    </div>

  </div>

  <!-- BUFFER -->
  <h3>Buffer Analysis</h3>
  <div class="card">
    <label>Radius (km)</label>
    <input type="number" id="bufferRadius" value="3">

    <button class="btn-primary" onclick="runBuffer()">Run Buffer</button>
    <button class="btn-secondary" onclick="clearBuffer()">Clear</button>
  </div>

  <!-- ISOCHRONE -->
  <h3>Isochrone</h3>
  <div class="card">

    <label>Travel Time (minutes)</label>
    <input type="number" id="isoTime" value="10">

    <label>Transport Mode</label>
    <select id="isoMode">
      <option value="driving-car">Car</option>
      <option value="driving-hgv">Truck</option>
      <option value="cycling-regular">Bike</option>
      <option value="foot-walking">Walking</option>
    </select>

    <button class="btn-primary" onclick="runIsochrone()">Run Isochrone</button>
    <button class="btn-secondary" onclick="clearIsochrone()">Clear</button>

  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="app.js"></script>

</body>
</html>
