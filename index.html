<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>StrateGeo WebGIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ======================
       SIDEBAR
    ====================== */
    #sidebar {
      position: absolute;
      width: 260px;
      height: 100%;
      background: linear-gradient(180deg, #181D27, #11151C);
      color: white;
      padding: 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
      z-index: 10;
    }

    #map {
      position: absolute;
      left: 260px;
      right: 0;
      top: 0;
      bottom: 0;
    }

    h2 {
      color: #69B578;
      margin-bottom: 25px;
      font-size: 22px;
    }

    h3 {
      margin-top: 25px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ======================
       CARD
    ====================== */
    .card {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* ======================
       LAYER ITEM
    ====================== */
    .layer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .layer-item:hover {
      background: rgba(255,255,255,0.08);
    }

    .layer-item span {
      font-size: 14px;
    }

    input[type="checkbox"] {
      accent-color: #69B578;
      transform: scale(1.1);
    }

    /* ======================
       INPUT
    ====================== */
    select, input[type="number"] {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #222;
      color: white;
    }

    /* ======================
       BUTTON
    ====================== */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
      transition: 0.2s;
    }

    .btn-primary {
      background: #3A7D44;
      color: white;
    }

    .btn-secondary {
      background: #2c2c2c;
      color: white;
    }

    button:hover {
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<!-- ======================
     SIDEBAR
====================== -->
<div id="sidebar">

  <h2>StrateGeo</h2>

  <!-- BASEMAP -->
  <h3>Basemap</h3>
  <div class="card">
    <select id="basemap">
      <option value="street">Street</option>
      <option value="dark">Dark</option>
      <option value="satellite">Satellite</option>
    </select>
  </div>

  <!-- LAYERS -->
  <h3>Layers</h3>
  <div class="card">

    <div class="layer-item">
      <span>Batas Administrasi</span>
      <input type="checkbox" id="admin" checked>
    </div>

    <div class="layer-item">
      <span>Jalan</span>
      <input type="checkbox" id="road" checked>
    </div>

    <div class="layer-item">
      <span>Supermarket</span>
      <input type="checkbox" id="demand" checked>
    </div>

    <div class="layer-item">
      <span>Warehouse</span>
      <input type="checkbox" id="warehouse" checked>
    </div>

  </div>

  <!-- BUFFER -->
  <h3>Buffer Analysis</h3>
  <div class="card">

    <label>Radius (km)</label>
    <input type="number" id="bufferRadius" value="3" min="1" max="50">

    <button class="btn-primary" onclick="runBuffer()">Run Buffer</button>
    <button class="btn-secondary" onclick="clearBuffer()">Clear</button>

  </div>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="app.js"></script>

</body>
</html>
